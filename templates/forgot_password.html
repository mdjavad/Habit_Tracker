{% extends 'main.html' %}
{% block title %}Forgot password — Habit Tracker{% endblock %}
{% block navbar %}{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header" style="background:var(--amber);">
      <div class="auth-header-icon">🔑</div>
      <h1>Reset password</h1>
      <p>We'll email you a reset link</p>
    </div>
    <div class="auth-body">
      <form method="POST" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="background:var(--amber);border-color:var(--amber);">
          Send reset link
        </button>
      </form>
    </div>
    <div class="auth-footer">
      Remembered it? <a href="{% url 'login' %}">Back to sign in</a>
    </div>
  </div>
</div>
{% endblock %}
