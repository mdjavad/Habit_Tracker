{% extends 'main.html' %}
{% block title %}Set new password — Habit Tracker{% endblock %}
{% block navbar %}{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header" style="background:var(--blue);">
      <div class="auth-header-icon">🔒</div>
      <h1>New password</h1>
      <p>Must be at least 5 characters</p>
    </div>
    <div class="auth-body">
      <form method="POST" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">New password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter new password" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm password</label>
          <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password" required>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="background:var(--blue);border-color:var(--blue);">
          Update password
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
